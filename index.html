<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro Audio — Modular Audio Suite</title>
  <meta name="description" content="Professional modular audio player built with Web Components. Pioneer-grade quality with zero dependencies.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/theme.css">
  <style>
    :root {
      --color-bg: #0e0e0e;
      --color-bg2: #1a1a1a;
      --color-bg3: #222;
      --color-border: #2a2a2a;
      --color-accent: #00D4FF;
      --color-accent2: #FF6B35;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--color-bg);
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }

    /* ===== APP LAYOUT ===== */
    .app {
      display: grid;
      grid-template-columns: 1fr 260px;
      grid-template-rows: 48px 1fr auto;
      height: 100vh;
    }

    /* ===== HEADER ===== */
    .header {
      grid-column: 1 / -1;
      background: linear-gradient(180deg, #1a1a1a, #131313);
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      z-index: 50;
    }
    .logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      color: var(--color-accent);
      text-transform: uppercase;
      letter-spacing: 3px;
      text-shadow: 0 0 12px rgba(0, 212, 255, 0.3);
    }
    .header-sep { width: 1px; height: 20px; background: #2a2a2a; }
    .header-btns { display: flex; gap: 6px; margin-left: auto; }
    .btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid #333;
      color: #777;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }
    .btn:hover { border-color: var(--color-accent); color: var(--color-accent); }
    .btn.accent {
      background: rgba(0, 212, 255, 0.08);
      border-color: rgba(0, 212, 255, 0.3);
      color: var(--color-accent);
    }
    .btn.accent:hover { background: var(--color-accent); color: #000; }
    
    .dropdown { position: relative; display: inline-block; }
    .dropdown-content {
      display: none;
      position: absolute;
      right: 0;
      top: 100%;
      margin-top: 8px;
      background: linear-gradient(180deg, #1f1f1f, #151515);
      min-width: 160px;
      border: 1px solid #333;
      border-radius: 6px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.8);
      z-index: 1000;
      overflow: hidden;
    }
    .dropdown.show .dropdown-content { display: block; }
    .dropdown-btn {
      display: block;
      width: 100%;
      text-align: left;
      background: transparent;
      border: none;
      color: #aaa;
      padding: 10px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      cursor: pointer;
      border-bottom: 1px solid #2a2a2a;
    }
    .dropdown-btn:last-child { border-bottom: none; }
    .dropdown-btn:hover { background: rgba(0, 212, 255, 0.1); color: var(--color-accent); }

    /* ===== TRANSPORT BAR (BOTTOM) ===== */
    .transport {
      grid-column: 1 / -1;
      grid-row: 3;
      background: linear-gradient(180deg, #161616, #0e0e0e);
      border-top: 1px solid #2a2a2a;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      z-index: 50;
    }
    .time { font-family: 'JetBrains Mono', monospace; min-width: 90px; }
    .time-current { font-size: 18px; color: var(--color-accent); text-shadow: 0 0 6px rgba(0, 212, 255, 0.3); }
    .time-sep { color: #333; margin: 0 4px; }
    .time-total { font-size: 13px; color: #555; }
    .t-btns { display: flex; gap: 4px; }
    .t-btn {
      width: 34px;
      height: 34px;
      border-radius: 7px;
      border: 1px solid #333;
      background: rgba(255,255,255,0.03);
      color: #666;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .t-btn:hover { border-color: var(--color-accent); color: var(--color-accent); }
    .t-btn.play {
      width: 40px;
      height: 40px;
      background: var(--color-accent);
      border-color: var(--color-accent);
      color: #000;
      font-size: 16px;
      border-radius: 50%;
      box-shadow: 0 0 16px rgba(0, 212, 255, 0.25);
    }
    .t-btn.play:hover { box-shadow: 0 0 24px rgba(0, 212, 255, 0.5); transform: scale(1.05); }
    .t-btn.play.paused { background: rgba(255,255,255,0.05); color: var(--color-accent); box-shadow: none; }
    .progress-container { flex: 1; display: flex; flex-direction: column; gap: 2px; }
    .progress { width: 100%; height: 5px; background: #1a1a1a; border-radius: 3px; cursor: pointer; position: relative; overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--color-accent), var(--color-accent2)); border-radius: 3px; transition: width 0.1s; }
    .track-info { min-width: 160px; text-align: right; }
    .track-title { font-size: 11px; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
    .track-artist { font-size: 9px; color: #555; }
    .track-cover {
      width: 34px;
      height: 34px;
      border-radius: 6px;
      background: #1a1a1a;
      border: 1px solid #333;
      object-fit: cover;
      display: none;
    }
    .track-cover.visible { display: block; }

    /* ===== MAIN WORKSPACE ===== */
    .workspace-container {
      grid-row: 2;
      grid-column: 1;
      background: radial-gradient(ellipse at center, #111 0%, #0a0a0a 100%);
      position: relative;
      overflow: hidden;
      /* Subtle grid pattern */
      background-image:
        radial-gradient(ellipse at center, #111 0%, #0a0a0a 100%),
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 100% 100%, 40px 40px, 40px 40px;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      grid-row: 2;
      grid-column: 2;
      background: linear-gradient(180deg, #151515, #101010);
      border-left: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .sidebar-section { padding: 14px 16px; border-bottom: 1px solid #1e1e1e; }
    .sidebar-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 12px;
    }
    .qc-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .qc-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .qc-label { font-family: 'JetBrains Mono', monospace; font-size: 8px; color: #555; text-transform: uppercase; }
    .master-row { display: flex; align-items: center; gap: 8px; }
    .master-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #555; text-transform: uppercase; min-width: 46px; }
    .master-db { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--color-accent); min-width: 40px; text-align: right; }
    .vu-row { display: flex; justify-content: center; gap: 10px; }
    .vu-meter { width: 18px; height: 65px; background: #0a0a0a; border-radius: 3px; border: 1px solid #222; position: relative; overflow: hidden; }
    .vu-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 0%; background: linear-gradient(to top, #00ff88, #ffaa00, #ff3333); transition: height 0.06s; }
    .pl-section { flex: 1; display: flex; flex-direction: column; min-height: 120px; }
    .pl-tracks { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 3px; }
    .pl-track {
      display: grid;
      grid-template-columns: 20px auto 1fr auto;
      gap: 6px;
      align-items: center;
      padding: 7px 10px;
      background: rgba(255,255,255,0.02);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid transparent;
    }
    .pl-track:hover { background: rgba(255,255,255,0.04); border-color: #2a2a2a; }
    .pl-track.playing { background: rgba(0, 212, 255, 0.06); border-color: rgba(0, 212, 255, 0.2); }
    .pl-num { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #444; text-align: center; }
    .pl-track.playing .pl-num { color: var(--color-accent); }
    .pl-cover-mini { width: 22px; height: 22px; border-radius: 3px; background: #1a1a1a; object-fit: cover; }
    .pl-name { font-size: 10px; color: #bbb; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pl-dur { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #444; }
    .pl-empty { text-align: center; padding: 20px 10px; color: #333; font-size: 10px; }

    /* ===== DROP ZONE ===== */
    .drop-zone { position: fixed; inset: 0; background: rgba(0, 212, 255, 0.06); border: 2px dashed var(--color-accent); display: flex; align-items: center; justify-content: center; z-index: 10000; opacity: 0; visibility: hidden; transition: all 0.2s; backdrop-filter: blur(4px); }
    .drop-zone.active { opacity: 1; visibility: visible; }
    .drop-text { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--color-accent); text-transform: uppercase; letter-spacing: 3px; }

    /* ===== LOADING ===== */
    .loading { position: fixed; inset: 0; background: #0a0a0a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 99999; transition: opacity 0.6s; }
    .loading.hidden { opacity: 0; pointer-events: none; }
    .loading-ring { width: 44px; height: 44px; border: 2px solid #1a1a1a; border-top-color: var(--color-accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--color-accent); letter-spacing: 3px; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="loading-ring"></div>
    <div class="loading-text">Pro Audio</div>
  </div>

  <div class="drop-zone" id="drop-zone">
    <span class="drop-text">↓ Drop Audio Files ↓</span>
  </div>

  <div class="app">
    <!-- HEADER -->
    <header class="header">
      <span class="logo">Pro Audio</span>
      <div class="header-sep"></div>
      <div class="header-btns">
        <div class="dropdown" id="views-dropdown">
          <button class="btn" id="btn-views">◰ Views ▾</button>
          <div class="dropdown-content" id="views-menu">
            <button class="dropdown-btn" data-workspace="studio">★ Pro Studio (Full)</button>
            <button class="dropdown-btn" data-workspace="all">🚀 All Components</button>
            <button class="dropdown-btn" data-workspace="dj">🎧 DJ Mode</button>
            <button class="dropdown-btn" data-workspace="minimal">⚡ Minimal (EQ/Spec)</button>
          </div>
        </div>
        <button class="btn accent" id="btn-components">◧ Components</button>
      </div>
    </header>



    <!-- WORKSPACE (Window Manager lives here) -->
    <div class="workspace-container">
      <pro-window-manager id="wm"></pro-window-manager>
    </div>

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">Quick Controls</div>
        <div class="qc-grid">
          <div class="qc-item">
            <pro-knob id="knob-low" value="0" min="-12" max="12" step="0.5" size="36" bipolar="true"></pro-knob>
            <span class="qc-label">Low</span>
          </div>
          <div class="qc-item">
            <pro-knob id="knob-mid" value="0" min="-12" max="12" step="0.5" size="36" bipolar="true"></pro-knob>
            <span class="qc-label">Mid</span>
          </div>
          <div class="qc-item">
            <pro-knob id="knob-high" value="0" min="-12" max="12" step="0.5" size="36" bipolar="true"></pro-knob>
            <span class="qc-label">High</span>
          </div>
          <div class="qc-item">
            <pro-knob id="knob-pan" value="0" min="-100" max="100" step="1" size="36" bipolar="true"></pro-knob>
            <span class="qc-label">Pan</span>
          </div>
          <div class="qc-item">
            <pro-knob id="knob-pitch" value="0" min="-50" max="50" step="1" size="36" bipolar="true"></pro-knob>
            <span class="qc-label">Pitch</span>
          </div>
          <div class="qc-item">
            <pro-knob id="knob-gain" value="0" min="-12" max="12" step="0.5" size="36" bipolar="true"></pro-knob>
            <span class="qc-label">Gain</span>
          </div>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-title">Master</div>
        <div class="master-row">
          <span class="master-label">Volume</span>
          <pro-fader id="master-vol" value="75" min="0" max="100" orientation="horizontal" length="100"></pro-fader>
          <span class="master-db" id="master-db">-3 dB</span>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-title">Level</div>
        <div class="vu-row">
          <div class="vu-meter"><div class="vu-bar" id="vu-l"></div></div>
          <div class="vu-meter"><div class="vu-bar" id="vu-r"></div></div>
        </div>
      </div>

      <div class="sidebar-section pl-section">
        <div class="sidebar-title">Playlist <span id="pl-count">0</span></div>
        <div class="pl-tracks" id="pl-tracks">
          <div class="pl-empty">Drop audio files to add tracks</div>
        </div>
        <button class="btn" id="btn-add" style="width:100%;margin-top:8px;padding:8px 0;font-size:11px;text-align:center;">+ Add Audio Files</button>
      </div>
    </aside>

    <!-- TRANSPORT BAR (BOTTOM) -->
    <div class="transport">
      <div class="t-btns">
        <button class="t-btn" id="btn-prev" title="Previous">⏮</button>
        <button class="t-btn play paused" id="btn-play" title="Play">▶</button>
        <button class="t-btn" id="btn-stop" title="Stop">⏹</button>
        <button class="t-btn" id="btn-next" title="Next">⏭</button>
      </div>
      <div class="time">
        <span class="time-current" id="time-current">0:00</span>
        <span class="time-sep">/</span>
        <span class="time-total" id="time-total">0:00</span>
      </div>
      <div class="progress-container">
        <div class="progress" id="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>
      <img class="track-cover" id="track-cover" alt="cover">
      <div class="track-info">
        <div class="track-title" id="track-title">No track loaded</div>
        <div class="track-artist" id="track-artist">—</div>
      </div>
    </div>
  </div>

  <input type="file" id="file-input" accept="audio/*" multiple style="display:none">

  <!-- AUDIO ENGINE (global, not inside any window) -->
  <pro-audio-engine id="engine" volume="0.75"></pro-audio-engine>

  <!-- WEB COMPONENTS -->
  <script type="module" src="./components/pro-knob.js"></script>
  <script type="module" src="./components/pro-fader.js"></script>
  <script type="module" src="./components/pro-audio-engine.js"></script>
  <script type="module" src="./components/pro-eq.js"></script>
  <script type="module" src="./components/pro-visualizer.js"></script>
  <script type="module" src="./components/pro-fx-rack.js"></script>
  <script type="module" src="./components/pro-playlist.js"></script>
  <script type="module" src="./components/pro-vinyl.js"></script>
  <script type="module" src="./components/window-manager.js"></script>

  <script type="module">
    import { parseID3FromFile } from './utils/id3-parser.js';

    const app = {
      tracks: [],
      currentIndex: -1,
      fxList: []
    };

    const engine = document.getElementById('engine');
    const loading = document.getElementById('loading');
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const wm = document.getElementById('wm');

    // Hide loader
    setTimeout(() => loading.classList.add('hidden'), 600);

    // ===== WINDOW MANAGER =====
    document.getElementById('btn-components').addEventListener('click', () => wm.toggleMenu());
    
    // ===== VIEWS DROPDOWN =====
    const viewsDropdown = document.getElementById('views-dropdown');
    document.getElementById('btn-views').addEventListener('click', (e) => {
      e.stopPropagation();
      viewsDropdown.classList.toggle('show');
    });
    document.addEventListener('click', () => {
      viewsDropdown.classList.remove('show');
    });
    document.getElementById('views-menu').querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        wm.loadWorkspace(btn.dataset.workspace);
      });
    });

    // ===== TRANSPORT (bottom bar) =====
    const btnPlay = document.getElementById('btn-play');
    const btnStop = document.getElementById('btn-stop');
    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');
    const progressBar = document.getElementById('progress-bar');
    const progressFill = document.getElementById('progress-fill');
    const timeCurrent = document.getElementById('time-current');
    const timeTotal = document.getElementById('time-total');
    const trackTitle = document.getElementById('track-title');
    const trackArtist = document.getElementById('track-artist');
    const trackCover = document.getElementById('track-cover');

    function syncPlayBtn(playing) {
      if (playing) {
        btnPlay.textContent = '⏸';
        btnPlay.classList.remove('paused');
      } else {
        btnPlay.textContent = '▶';
        btnPlay.classList.add('paused');
      }
    }

    btnPlay.addEventListener('click', () => {
      if (engine.isPlaying) {
        engine.pause();
      } else {
        if (app.favorites.length > 0 && app.currentIndex === -1) {
          playTrack(0);
        } else if (app.favorites.length > 0) {
          engine.play();
        }
      }
    });

    btnStop.addEventListener('click', () => {
      engine.stop();
      syncPlayBtn(false);
      progressFill.style.width = '0%';
      timeCurrent.textContent = '0:00';
    });

    btnPrev.addEventListener('click', () => { if (app.currentIndex > 0) playTrack(app.currentIndex - 1); });
    btnNext.addEventListener('click', () => { if (app.currentIndex < app.tracks.length - 1) playTrack(app.currentIndex + 1); });

    // Sync button state from engine events
    engine.addEventListener('track-play', () => syncPlayBtn(true));
    engine.addEventListener('track-pause', () => syncPlayBtn(false));
    engine.addEventListener('track-ended', () => {
      syncPlayBtn(false);
      if (app.currentIndex > -1 && app.currentIndex < app.favorites.length - 1) {
        playTrack(app.currentIndex + 1);
      }
    });

    progressBar.addEventListener('click', (e) => {
      const rect = progressBar.getBoundingClientRect();
      const pct = (e.clientX - rect.left) / rect.width;
      if (engine.duration > 0) engine.seek(pct * engine.duration);
    });

    engine.addEventListener('time-update', (e) => {
      const { currentTime, duration } = e.detail;
      timeCurrent.textContent = formatTime(currentTime);
      timeTotal.textContent = formatTime(duration);
      if (duration > 0) progressFill.style.width = ((currentTime / duration) * 100) + '%';
    });

    engine.addEventListener('track-loaded', (e) => {
      const { metadata } = e.detail;
      trackTitle.textContent = metadata.title || 'Unknown';
      trackArtist.textContent = metadata.artist || 'Unknown Artist';
      if (metadata.coverArt) {
        trackCover.src = metadata.coverArt;
        trackCover.classList.add('visible');
      } else {
        trackCover.classList.remove('visible');
      }
    });

    // Vinyl disc transport events (prev/next)
    document.addEventListener('transport-prev', () => { if (app.currentIndex > 0) playTrack(app.currentIndex - 1); });
    document.addEventListener('transport-next', () => { if (app.currentIndex < app.favorites.length - 1) playTrack(app.currentIndex + 1); });

    function formatTime(s) {
      if (!s || isNaN(s)) return '0:00';
      return Math.floor(s / 60) + ':' + Math.floor(s % 60).toString().padStart(2, '0');
    }

    // ===== FAVORITES RENDER =====
    function playTrack(index) {
      if (index < 0 || index >= app.favorites.length) return;
      app.currentIndex = index;
      const track = app.favorites[index];

      engine.loadTrack(track.url, track.metadata).then(() => {
        engine.play();
        // Vinyl disc reacts via 'track-play' event dispatched by engine
      });
      renderFavorites();
    }

    function renderFavorites() {
      const container = document.getElementById('pl-tracks');
      const count = document.getElementById('pl-count');
      if (app.favorites.length === 0) {
        container.innerHTML = '<div class="pl-empty">Click ★ in Playlist or drop files here</div>';
        count.textContent = '0';
        return;
      }
      count.textContent = app.favorites.length;
      let html = '';
      for (let i = 0; i < app.favorites.length; i++) {
        const t = app.favorites[i];
        const playing = i === app.currentIndex ? ' playing' : '';
        const coverSrc = t.metadata.coverArt || '';
        const coverHtml = coverSrc
          ? `<img class="pl-cover-mini" src="${coverSrc}" alt="">`
          : '<div class="pl-cover-mini"></div>';
        html += `<div class="pl-track${playing}" data-index="${i}">
          <span class="pl-num">${i + 1}</span>
          ${coverHtml}
          <span class="pl-name">${t.metadata.title || 'Unknown'}</span>
          <span class="pl-dur">${formatTime(t.metadata.duration)}</span>
          <button class="pl-track-remove" onclick="event.stopPropagation(); window.dispatchEvent(new CustomEvent('toggle-favorite', { detail: { url: '${t.url}' } }))">×</button>
        </div>`;
      }
      container.innerHTML = html;
      container.querySelectorAll('.pl-track').forEach(el => {
        el.addEventListener('click', () => playTrack(parseInt(el.dataset.index)));
      });
    }

    // ===== FILE LOADING WITH ID3 =====
    document.getElementById('btn-add').addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => handleFileInput(e.target.files));
    document.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('active'); });
    document.addEventListener('dragleave', (e) => { if (!e.relatedTarget) dropZone.classList.remove('active'); });
    document.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('active'); handleFileInput(e.dataTransfer.files); });

    async function handleFileInput(files) {
      const newFiles = [];
      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        if (!file.type.startsWith('audio/') && !file.name.match(/\.(mp3|wav|ogg|flac|m4a|aac)$/i)) continue;
        newFiles.push(file);
      }

      for (const file of newFiles) {
        const track = await loadFileWithID3(file);
        if (track) {
           app.favorites.push(track);
        }
      }

      renderFavorites();
      window.dispatchEvent(new CustomEvent('favorites-updated', {
        detail: { favorites: window.ProApp.getFavorites() }
      }));
      if (app.favorites.length > 0 && app.currentIndex === -1) playTrack(0);
    }

    async function loadFileWithID3(file) {
      const url = URL.createObjectURL(file);

      // Parse ID3 metadata
      let id3 = {};
      try {
        id3 = await parseID3FromFile(file);
      } catch (e) {
        console.warn('ID3 parse failed:', e);
      }

      const metadata = {
        title: id3.title || file.name.replace(/\.[^.]+$/, ''),
        artist: id3.artist || 'Unknown Artist',
        album: id3.album || 'Unknown Album',
        duration: id3.duration || 0,
        coverArt: id3.coverArt || null
      };

      // Get duration
      await new Promise((resolve) => {
        const audio = new Audio();
        audio.src = url;
        audio.addEventListener('loadedmetadata', () => {
          metadata.duration = audio.duration;
          resolve();
        });
        audio.addEventListener('error', resolve);
      });

      return { url, metadata };
    }

    // ===== QUICK CONTROLS (wired to engine) =====
    Promise.all([
      customElements.whenDefined('pro-knob'),
      customElements.whenDefined('pro-fader')
    ]).then(() => {
      const knobLow  = document.getElementById('knob-low');
      const knobMid  = document.getElementById('knob-mid');
      const knobHigh = document.getElementById('knob-high');
      const knobPan  = document.getElementById('knob-pan');
      const knobPitch = document.getElementById('knob-pitch');
      const knobGain = document.getElementById('knob-gain');
      const masterVol = document.getElementById('master-vol');
      const masterDb  = document.getElementById('master-db');

      // EQ Quick Controls
      if (knobLow) knobLow.addEventListener('input', (e) => engine.setEqBand(1, e.detail.value));
      if (knobMid) knobMid.addEventListener('input', (e) => engine.setEqBand(5, e.detail.value));
      if (knobHigh) knobHigh.addEventListener('input', (e) => engine.setEqBand(9, e.detail.value));

      // Pan -> StereoPannerNode
      if (knobPan) knobPan.addEventListener('input', (e) => {
        engine.pan = e.detail.value / 100; // map -100..100 to -1..1
      });

      // Pitch -> playbackRate
      if (knobPitch) knobPitch.addEventListener('input', (e) => {
        // Map -50..50 to 0.5..2.0 (exponential)
        const pct = e.detail.value / 50; // -1 to 1
        engine.playbackRate = Math.pow(2, pct); // 0.5 to 2.0
      });

      // Gain -> preGain stage
      if (knobGain) knobGain.addEventListener('input', (e) => {
        // Map -12..12 dB to linear gain
        engine.preGain = Math.pow(10, e.detail.value / 20);
      });

      // Master Volume
      if (masterVol) {
        masterVol.addEventListener('input', (e) => {
          engine.volume = e.detail.value / 100;
          const db = engine.volume === 0 ? '-∞' : (20 * Math.log10(engine.volume)).toFixed(1) + ' dB';
          masterDb.textContent = db;
        });
      }
    });

    // ===== SIDEBAR VU METERS =====
    function updateVU() {
      if (engine.analyser) {
        const data = new Uint8Array(engine.analyser.frequencyBinCount);
        engine.analyser.getByteFrequencyData(data);

        // dBFS-based levels
        let sumL = 0, sumR = 0;
        for (let i = 0; i < 32; i++) { sumL += data[i] * data[i]; }
        for (let j = 32; j < 64; j++) { sumR += data[j] * data[j]; }
        const rmsL = Math.sqrt(sumL / 32) / 255;
        const rmsR = Math.sqrt(sumR / 32) / 255;
        const dbL = rmsL > 0.001 ? Math.max(-48, 20 * Math.log10(rmsL)) : -48;
        const dbR = rmsR > 0.001 ? Math.max(-48, 20 * Math.log10(rmsR)) : -48;
        const pctL = ((dbL + 48) / 48) * 100;
        const pctR = ((dbR + 48) / 48) * 100;

        document.getElementById('vu-l').style.height = pctL + '%';
        document.getElementById('vu-r').style.height = pctR + '%';
      }
      requestAnimationFrame(updateVU);
    }
    updateVU();

    // ===== INIT AUDIO CONTEXT ON USER GESTURE =====
    document.body.addEventListener('click', () => {
      if (engine.audioContext && engine.audioContext.state === 'suspended') {
        engine.audioContext.resume();
      }
    }, { once: true });

    console.log('%c✦ Pro Audio Suite loaded', 'color: #00D4FF; font-size: 12px; font-weight: bold;');
  </script>
</body>
